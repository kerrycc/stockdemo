name: Nightly Stock Agent Workflow

on:
  schedule:
    # 國際標準時間 (UTC) 15:00 等於台灣時間 (CST) 晚上 23:00
    # 每天晚上 11 點自動啟動，僅在週一至週五 (交易日 1-5) 執行
    - cron: '0 15 * * 1-5'
  workflow_dispatch: # 允許你在 GitHub 介面上手動點選按鈕、隨時測試觸發

jobs:
  run-stock-agent:
    runs-on: ubuntu-latest

    steps:
    - name: 檢查並拉取程式碼
      uses: actions/checkout@v4

    - name: 初始化 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安裝自動化必備套件
      run: |
        python -m pip install --upgrade pip
        pip install yfinance requests anthropic ujson

    - name: 執行 Python 腳本並注入安全金鑰
      env:
        # 將步驟一設定的儲存庫 Secrets 帶入執行環境變數中
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      run: python stock_agent.py